name: Nightly scrape

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC ≈ 00:00 ET
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          COLLEGE_SCORECARD_API_KEY: ${{ secrets.COLLEGE_SCORECARD_API_KEY }}
        run: python -m scraper.scrape

      - name: Commit data.json if changed
        run: |
          if [[ -n "$(git status --porcelain site/data.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/data.json
            git commit -m "data: nightly refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes."
          fi
